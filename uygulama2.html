<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birim Dönüştürücü</title>
  <link rel="stylesheet" href="styles/uygulama2.css" />
</head>
<body>

  <a class="btn-geri" href="../hafta1/labs.html">Geri Dön</a>

  <div class="converter-card">
    <h2>Birim Dönüştürücü</h2>

    <div class="form-group">
      <label for="deger1">Değer Giriniz:</label>
      <input type="number" id="deger1" placeholder="Örn: 50" />
    </div>

    <div class="form-group">
      <label for="tip1">Dönüşüm Tipi:</label>
      <select id="tip1">
        <optgroup label="── Uzunluk ──">
          <option value="m-km">Metre → Kilometre</option>
          <option value="km-m">Kilometre → Metre</option>
          <option value="km-mil">Kilometre → Mil</option>
          <option value="mil-km">Mil → Kilometre</option>
        </optgroup>
        <optgroup label="── Sıcaklık ──">
          <option value="c-f">Celsius → Fahrenheit</option>
          <option value="f-c">Fahrenheit → Celsius</option>
          <option value="c-k">Celsius → Kelvin</option>
          <option value="k-c">Kelvin → Celsius</option>
        </optgroup>
        <optgroup label="── Kütle ──">
          <option value="kg-g">Kilogram → Gram</option>
          <option value="g-kg">Gram → Kilogram</option>
        </optgroup>
      </select>
    </div>

    <button class="btn-hesapla" onclick="donustur(1)">Hesapla</button>
    <div class="sonuc-box empty" id="sonuc1">–</div>
  </div>

  <script src="scripts/uygulama2.js"></script>

</body>
</html>
